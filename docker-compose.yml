version: '3.8'

services:
  bluespark_aut:
    build: .
    container_name: bluespark_drone
    network_mode: host
    privileged: true 
    stdin_open: true 
    tty: true
    volumes:
      - .:/workspace
      - /dev:/dev # TODO: probably decide on specific /dev ports
      - /tmp/.X11-unix:/tmp/.X11-unix 
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    restart: unless-stopped
